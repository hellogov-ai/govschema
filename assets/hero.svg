<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" role="img" aria-label="GovSchema — open standards for agent–government interaction">
  <!-- README hero banner, Direction C (GOV-541/GOV-303). This is the vector
       documentation source for hero.png, kept for reference — it does NOT
       have pixel parity with the committed hero.png. The shipped PNG is a
       Nano-generated ink-black spec-sheet texture (background only) with this
       same mark/wordmark/tagline composited on top at 2560x800; this file is
       the flat, textureless alternate (no generated layer), provenance in
       govschema-landing assets/generated/concepts/PROVENANCE.md. Real L1 mark
       (board-confirmed GOV-197) composited as vector strokes, not model-drawn.
       Flat ink ground, no gradient — same "near-monochrome austerity" as
       og-card.svg (Phase 6). -->
  <rect width="1280" height="400" fill="#1a1a18"/>

  <!-- Decorative node-topology motif (GOV-208 grammar), bottom-right quadrant only,
       clear of all text. Terminal node carries the single accent (vermilion),
       same "active node" language as every on-site diagram instance. -->
  <g fill="none" stroke="#f4f1ea" stroke-opacity="0.14" stroke-width="1.5">
    <path d="M1010 250 L1064 284 L1040 328 L1098 360"/>
  </g>
  <g fill="#f4f1ea" fill-opacity="0.2">
    <circle cx="1010" cy="250" r="4.5"/>
    <circle cx="1064" cy="284" r="4.5"/>
    <circle cx="1040" cy="328" r="4.5"/>
  </g>
  <circle cx="1098" cy="360" r="5.5" fill="#e24b2a" fill-opacity="0.85"/>

  <!-- mark badge — vector { } strokes (shared geometry with favicon.svg, GOV-208
       refined, board-confirmed GOV-197), scaled into an 88×88 badge -->
  <rect x="64" y="64" width="88" height="88" rx="16" fill="#f4f1ea" fill-opacity="0.08" stroke="#f4f1ea" stroke-opacity="0.18"/>
  <g transform="translate(64,64) scale(1.375)" fill="none" stroke="#f4f1ea" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M30 18 C26.6 18 26 19.6 26 22 L26 29 C26 30.3 24.6 31 18.5 32 C24.6 33 26 33.7 26 35 L26 42 C26 44.4 26.6 46 30 46"/>
    <path d="M34 18 C37.4 18 38 19.6 38 22 L38 29 C38 30.3 39.4 31 45.5 32 C39.4 33 38 33.7 38 35 L38 42 C38 44.4 37.4 46 34 46"/>
  </g>

  <!-- wordmark -->
  <text x="176" y="122" font-family="'IBM Plex Sans', -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="46" font-weight="600" fill="#f4f1ea" letter-spacing="-0.5">GovSchema</text>

  <!-- tagline -->
  <text x="64" y="200" font-family="'IBM Plex Sans', -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="29" font-weight="400" fill="#cfcbc0" letter-spacing="-0.2">Open standards for agent–government interaction</text>

  <!-- accent rule -->
  <rect x="64" y="230" width="112" height="6" rx="3" fill="#e24b2a"/>

  <!-- footer meta -->
  <text x="64" y="358" font-family="'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, monospace" font-size="17"
        font-weight="400" fill="#8b897f" letter-spacing="0.5">OPEN STANDARD · DRAFT v0.1 · INDEPENDENT, OPEN-SOURCE · govschema.org</text>
</svg>
