name: review-gate-status

# GOV-360: enforcement mechanism for the GOV-355 governance gap (schema PR
# authors can merge their own PR while the review gate is still open). All
# recent PR authorship/merges on this repo resolve to the same shared GitHub
# identity, so GitHub's native "require approving review" would deadlock
# every merge. This check enforces the process rule instead: a linked
# Paperclip "Review gate: GOV-XX ... (PR #N)" issue must be resolved.
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  review-gate-status:
    runs-on: ubuntu-latest
    steps:
      - name: Determine if this PR touches registry/** or spec/**
        id: scope
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const touches = files.some(
              (f) => f.filename.startsWith("registry/") || f.filename.startsWith("spec/")
            );
            core.setOutput("gated", touches ? "true" : "false");

      - name: Auto-pass (docs/tooling-only PR)
        if: steps.scope.outputs.gated == 'false'
        run: echo "PR does not touch registry/** or spec/** — no review gate required."

      - uses: actions/setup-node@v4
        if: steps.scope.outputs.gated == 'true'
        with:
          node-version: "20"

      - name: Verify linked review-gate issue is resolved
        if: steps.scope.outputs.gated == 'true'
        env:
          PAPERCLIP_REVIEW_GATE_RO_TOKEN: ${{ secrets.PAPERCLIP_REVIEW_GATE_RO_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node .github/scripts/check-review-gate.mjs
