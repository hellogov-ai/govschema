name: validate

on:
  push:
  pull_request:

jobs:
  validate-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate all GovSchema documents
        run: node tools/validate.mjs
      - name: Check discovery catalog integrity
        run: node discovery/check.mjs
