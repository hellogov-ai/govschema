name: validate

on:
  push:
  pull_request:

jobs:
  validate-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tools/package-lock.json
      # Zero-dependency structural validation + registry hygiene (no install).
      - name: Validate all GovSchema documents (structural)
        run: node tools/validate.mjs
      # Full JSON Schema draft 2020-12 meta-schema conformance (ajv). This
      # enforces the SPEC §2 conformance claim on every push and pull request,
      # rather than leaving it as a manual step.
      - name: Install validation dependencies
        working-directory: tools
        run: npm ci
      - name: Validate all GovSchema documents (ajv 2020-12 meta-schema)
        run: node tools/validate-ajv.mjs
      # Discovery catalog integrity (zero-dependency). Lives outside registry/
      # so the registry stray-file rule is unaffected.
      - name: Check discovery catalog integrity
        run: node discovery/check.mjs
      # @govschema/client: non-normative reference client (GOV-269). Self-test
      # also checks the committed registry-index.json isn't stale.
      - name: Install govschema-client dependencies
        working-directory: tools/govschema-client
        run: npm ci
      - name: Test @govschema/client
        working-directory: tools/govschema-client
        run: npm test
      # @govschema/mcp-server: reference MCP server over govschema-client
      # (GOV-269), read-only by construction — see tools/mcp-server/test.mjs.
      - name: Install mcp-server dependencies
        working-directory: tools/mcp-server
        run: npm ci
      - name: Test @govschema/mcp-server
        working-directory: tools/mcp-server
        run: npm test
