name: validate

on:
  push:
  pull_request:

jobs:
  validate-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tools/package-lock.json
      # Zero-dependency structural validation + registry hygiene (no install).
      # Also checks registry-index.json referential integrity (GOV-1234):
      # every entry's `path` must resolve to an existing, validating
      # schema.json with matching id/version/edition, checked against the
      # checkout as-is — i.e. before the "is the index stale" step below
      # regenerates it, so a dangling entry can't hide behind a regeneration
      # that only becomes possible once the missing file lands in a later PR.
      - name: Validate all GovSchema documents (structural)
        run: node tools/validate.mjs
      # Full JSON Schema draft 2020-12 meta-schema conformance (ajv). This
      # enforces the SPEC §2 conformance claim on every push and pull request,
      # rather than leaving it as a manual step.
      - name: Install validation dependencies
        working-directory: tools
        run: npm ci
      - name: Validate all GovSchema documents (ajv 2020-12 meta-schema)
        run: node tools/validate-ajv.mjs
      # Discovery catalog integrity (zero-dependency). Lives outside registry/
      # so the registry stray-file rule is unaffected.
      - name: Check discovery catalog integrity
        run: node discovery/check.mjs
      # registry-index.json (bundled by @govschema/client) is generated from
      # registry/ by generate-index.mjs and must be regenerated whenever a
      # schema is added/changed or a discovery/catalog.json candidate flips to
      # "published" (GOV-478: this was missed twice pre-merge because nothing
      # caught it until the client's own npm test ran). Zero-dependency, so it
      # runs here before any npm ci, right next to the other registry checks —
      # fails fast with a diff instead of a buried test assertion.
      - name: Check registry-index.json is up to date
        run: |
          node tools/govschema-client/generate-index.mjs
          git diff --exit-code -- tools/govschema-client/registry-index.json || {
            echo "::error::registry-index.json is stale. Run 'npm run build-index' in tools/govschema-client/ and commit the result.";
            exit 1;
          }
      # llms.txt / llms-full.txt are generated by site/build.mjs from site.json
      # and SPEC.md, then committed at the repo root so they render on GitHub.
      # Regenerate and diff so an edit to either source can't silently drift
      # from what's committed.
      - name: Check llms.txt / llms-full.txt are up to date
        run: |
          node site/build.mjs
          git diff --exit-code -- llms.txt llms-full.txt
      # @govschema/client: non-normative reference client (GOV-269). Self-test
      # also checks the committed registry-index.json isn't stale.
      - name: Install govschema-client dependencies
        working-directory: tools/govschema-client
        run: npm ci
      - name: Test @govschema/client
        working-directory: tools/govschema-client
        run: npm test
      # @govschema/mcp-server: reference MCP server over govschema-client
      # (GOV-269), read-only by construction — see tools/mcp-server/test.mjs.
      - name: Install mcp-server dependencies
        working-directory: tools/mcp-server
        run: npm ci
      - name: Test @govschema/mcp-server
        working-directory: tools/mcp-server
        run: npm test
      # @govschema/skill: installable Claude-family Skill over govschema-client
      # (GOV-271), same boundary as mcp-server — see tools/govschema-skill/test.mjs.
      - name: Install govschema-skill dependencies
        working-directory: tools/govschema-skill
        run: npm ci
      - name: Test @govschema/skill
        working-directory: tools/govschema-skill
        run: npm test
